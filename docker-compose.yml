services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bidparty
      POSTGRES_PASSWORD: bidparty
      POSTGRES_DB: bidparty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://bidparty:bidparty@postgres:5432/bidparty
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme
      PORT: 4000
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
